name: Deploy to AWS

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: |
        node --check server.js && echo "PASS - Syntax OK"
        grep -r "DB_PASS\s*:" server.js && echo "FAIL - hardcoded password" && exit 1 || echo "PASS - no hardcoded passwords"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ec2-user/onlinebakala-repo",
            "git pull origin main",
            "cp server.js /home/ec2-user/onlinebakala/server.js",
            "cp ecosystem.config.js /home/ec2-user/onlinebakala/ecosystem.config.js",
            "cp package.json /home/ec2-user/onlinebakala/package.json",
            "cp package-lock.json /home/ec2-user/onlinebakala/package-lock.json",
            "cp *.html /home/ec2-user/onlinebakala/",
            "cd /home/ec2-user/onlinebakala",
            "npm install --production",
            "pm2 restart onlinebakala",
            "sleep 5",
            "curl -f http://localhost:3000/health && echo DEPLOY_SUCCESS || echo DEPLOY_FAILED"
          ]' \
          --region eu-west-1 \
          --query 'Command.CommandId' \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        for i in {1..24}; do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region eu-west-1 \
            --query 'Status' \
            --output text 2>/dev/null || echo "Pending")
          echo "Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Deploy to EC2 succeeded"
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
            echo "DEPLOY FAILED - stopping before AMI bake"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region eu-west-1 \
              --query 'StandardErrorContent' \
              --output text
            exit 1
          fi
          sleep 5
        done

    - name: Bake new AMI
      id: bake_ami
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        AMI_NAME="onlinebakala-${TIMESTAMP}"

        AMI_ID=$(aws ec2 create-image \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
          --name "$AMI_NAME" \
          --description "Auto-baked by CI/CD on git push to main" \
          --no-reboot \
          --region eu-west-1 \
          --query 'ImageId' \
          --output text)

        echo "New AMI ID: $AMI_ID"
        echo "AMI_ID=$AMI_ID" >> $GITHUB_OUTPUT

        echo "Waiting for AMI to become available..."
        aws ec2 wait image-available \
          --image-ids "$AMI_ID" \
          --region eu-west-1

        echo "AMI $AMI_ID is ready"

    - name: Update Launch Template with new AMI
      run: |
        AMI_ID="${{ steps.bake_ami.outputs.AMI_ID }}"

        NEW_VERSION=$(aws ec2 create-launch-template-version \
          --launch-template-name "${{ secrets.LAUNCH_TEMPLATE_NAME }}" \
          --source-version '$Latest' \
          --launch-template-data "{\"ImageId\":\"${AMI_ID}\"}" \
          --region eu-west-1 \
          --query 'LaunchTemplateVersion.VersionNumber' \
          --output text)

        echo "New Launch Template version: $NEW_VERSION"

        aws ec2 modify-launch-template \
          --launch-template-name "${{ secrets.LAUNCH_TEMPLATE_NAME }}" \
          --default-version "$NEW_VERSION" \
          --region eu-west-1

        echo "Launch Template default is now version $NEW_VERSION (AMI: $AMI_ID)"
        echo "Any new ASG instance will use the latest code automatically"
